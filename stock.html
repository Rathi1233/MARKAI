<!DOCTYPE html>
<html>
<head>
  <title>Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen text-white">

  <div class="p-4">

    <h1 class="text-2xl font-bold mb-4">📦 Stock Management</h1>

    <!-- ➕ ADD PRODUCT -->
    <div class="bg-white/10 p-4 rounded-xl mb-4">

      <input id="name" placeholder="Product Name"
        class="w-full p-2 mb-2 rounded text-black">

      <input id="quantity" type="number" placeholder="Quantity"
        class="w-full p-2 mb-2 rounded text-black">

      <input id="costPrice" type="number" placeholder="Cost Price"
        class="w-full p-2 mb-2 rounded text-black">

      <input id="sellingPrice" type="number" placeholder="Selling Price"
        class="w-full p-2 mb-2 rounded text-black">

      <button id="addBtn" onclick="addProduct()"
        class="bg-blue-500 w-full p-2 rounded hover:bg-blue-600 transition">
        Add Product
      </button>

    </div>

    <!-- 📋 PRODUCT LIST -->
    <div id="productList" class="space-y-2"></div>

  </div>

  <!-- 🔔 TOAST -->
  <div id="toast"
    class="fixed bottom-5 right-5 hidden text-white px-4 py-2 rounded shadow-lg">
  </div>

  <script type="module" src="./js/stock.js"></script>
</body>
</html>
