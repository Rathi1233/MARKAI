<!DOCTYPE html>
<html>
<head>
  <title>Stock Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 min-h-screen text-white font-sans relative">

  <!-- Glows -->
  <div class="fixed top-0 right-0 w-96 h-96 bg-blue-600/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>

  <!-- Header -->
  <div class="sticky top-0 z-20 glass-panel p-4 flex items-center gap-4">
    <button onclick="window.location.href='dashboard.html'" class="w-10 h-10 rounded-full glass-card flex items-center justify-center hover:bg-white/10 transition">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-2xl font-bold tracking-tight">📦 Inventory</h1>
  </div>

  <div class="p-6 max-w-3xl mx-auto space-y-6 relative z-10">

    <!-- ➕ ADD PRODUCT -->
    <div class="glass-card p-6 rounded-2xl">
      <h2 class="text-lg font-semibold mb-4 text-gray-200">Add New Product</h2>
      
      <!-- AI SCANNER -->
      <div class="mb-5 p-4 border border-blue-500/30 bg-blue-500/5 rounded-xl">
        <label class="text-xs text-blue-300 font-bold mb-2 flex items-center gap-2"><i class="fas fa-camera"></i> Auto-fill with Image (AI)</label>
        <div class="flex flex-col sm:flex-row gap-3">
          <input type="file" id="productImage" accept="image/*" class="flex-1 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 transition cursor-pointer">
          <button id="scanBtn" onclick="scanImage()" class="bg-gradient-to-r from-blue-500 to-indigo-500 px-4 py-2 rounded-xl shadow-lg shadow-blue-500/30 hover:scale-[1.02] transition font-semibold text-sm flex items-center justify-center gap-2 whitespace-nowrap"><i class="fas fa-magic"></i> Scan Name</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="text-xs text-gray-400 ml-1 mb-1 block">Product Name</label>
          <input id="name" placeholder="E.g. Wireless Mouse"
          class="w-full p-3 rounded-xl glass-input">
        </div>
        
        <div>
          <label class="text-xs text-gray-400 ml-1 mb-1 block">Quantity</label>
          <input id="quantity" type="number" placeholder="0"
          class="w-full p-3 rounded-xl glass-input">
        </div>

        <div>
           <label class="text-xs text-gray-400 ml-1 mb-1 block">Cost Price (₹)</label>
           <input id="costPrice" type="number" placeholder="0.00"
          class="w-full p-3 rounded-xl glass-input">
        </div>

        <div>
           <label class="text-xs text-gray-400 ml-1 mb-1 block">Selling Price (₹)</label>
           <input id="sellingPrice" type="number" placeholder="0.00"
          class="w-full p-3 rounded-xl glass-input">
        </div>
      </div>

      <button id="addBtn" onclick="addProduct()"
        class="glass-button w-full p-3 rounded-xl font-semibold flex items-center justify-center gap-2">
        <i class="fas fa-plus"></i> Add to Inventory
      </button>

    </div>

    <!-- 📋 PRODUCT LIST -->
    <div>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-200">Current Stock</h2>
        <div class="relative w-48 sm:w-64">
          <i class="fas fa-search absolute left-3 top-3 text-gray-500 text-sm"></i>
          <input type="text" id="searchInput" oninput="filterStock()" placeholder="Search products..." class="w-full bg-white/5 border border-white/10 rounded-xl pl-9 pr-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-blue-500/50 transition">
        </div>
      </div>
      <div id="productList" class="space-y-3"></div>
    </div>

  </div>

  <!-- 🔔 TOAST -->
  <div id="toast"
    class="fixed bottom-5 right-5 hidden px-6 py-3 rounded-xl glass-panel text-white shadow-2xl z-50 transform transition-all duration-300">
  </div>

  <script type="module" src="./js/stock.js"></script>
</body>
</html>
