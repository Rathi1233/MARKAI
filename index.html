<!DOCTYPE html>
<html>
<head>
  <title>MARKAI Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-xl shadow-md w-80">
    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 mb-3 border rounded">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 mb-3 border rounded">

    <button onclick="login()"
      class="w-full bg-blue-500 text-white p-2 rounded mb-2">
      Login
    </button>

    <button onclick="signup()"
      class="w-full bg-green-500 text-white p-2 rounded">
      Signup
    </button>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
